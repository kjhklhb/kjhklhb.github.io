<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>生物知识图谱 · Biology Knowledge Graph</title>
<script type="text/javascript" src="https://unpkg.com/vis-network@9.1.6/dist/vis-network.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:"Segoe UI","PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  background:#080a10;color:#e0e4ee;
  -webkit-font-smoothing:antialiased;
}
body::after{
  content:'';position:fixed;inset:0;z-index:9999;
  pointer-events:none;opacity:0.02;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:256px 256px;
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}

#cursor-glow{
  position:fixed;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle at center,rgba(77,200,120,0.04),transparent 70%);
  pointer-events:none;z-index:1;transform:translate(-50%,-50%);
}

nav{
  position:fixed;top:0;left:0;width:100%;z-index:1000;
  padding:20px 36px;display:flex;justify-content:space-between;
  align-items:center;transition:background 0.4s;
  background:rgba(8,10,16,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.03);
}
.nav-logo{font-size:1rem;font-weight:300;letter-spacing:4px;color:rgba(255,255,255,0.5)}
.nav-logo span{color:rgba(77,200,120,0.5)}
.nav-links{list-style:none;display:flex;gap:28px}
.nav-links a{
  color:rgba(255,255,255,0.35);text-decoration:none;font-size:0.78rem;
  letter-spacing:2px;font-weight:400;text-transform:uppercase;
  transition:color 0.3s;
}
.nav-links a:hover{color:rgba(255,255,255,0.7)}
.nav-links a.active{color:rgba(77,200,120,0.7)}

#network-container{
  position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;
}

.title-overlay{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);
  z-index:10;text-align:center;pointer-events:none;
}
.title-overlay h1{
  font-size:1.4rem;font-weight:200;letter-spacing:6px;color:rgba(255,255,255,0.35);
  text-shadow:0 0 60px rgba(0,0,0,0.8);
}
.title-overlay h1 strong{
  font-weight:700;
  background:linear-gradient(135deg,rgba(77,200,120,0.6),rgba(100,220,180,0.6));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.info-panel{
  position:fixed;bottom:36px;left:50%;transform:translateX(-50%);
  z-index:10;pointer-events:none;text-align:center;
}
.info-panel p{
  font-size:0.7rem;letter-spacing:2px;color:rgba(255,255,255,0.12);
}

.legend{
  position:fixed;right:28px;top:50%;transform:translateY(-50%);
  z-index:10;display:flex;flex-direction:column;gap:10px;
  background:rgba(8,10,16,0.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.04);border-radius:12px;
  padding:16px 14px;
}
.legend-item{display:flex;align-items:center;gap:8px;font-size:0.65rem;color:rgba(255,255,255,0.3);letter-spacing:1px;white-space:nowrap}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-dot.core{background:#4dc878;box-shadow:0 0 12px rgba(77,200,120,0.4)}
.legend-dot.concept{background:#6eb5ff;box-shadow:0 0 8px rgba(110,181,255,0.3)}
.legend-dot.detail{background:#c084fc;box-shadow:0 0 8px rgba(192,132,252,0.3)}
.legend-dot.process{background:#fbbf24;box-shadow:0 0 8px rgba(251,191,36,0.3)}
.legend-dot.structure{background:#f472b6;box-shadow:0 0 8px rgba(244,114,182,0.3)}

@media(max-width:600px){
  .title-overlay h1{font-size:1rem;letter-spacing:3px}
  .legend{right:12px;padding:10px 8px;gap:6px}
  .legend-item{font-size:0.55rem}
  nav{padding:14px 16px}
  .nav-logo{font-size:0.8rem}
  .nav-links{gap:12px}
  .nav-links a{font-size:0.65rem;letter-spacing:1px}
}
</style>
</head>
<body>
<div id="cursor-glow"></div>

<nav>
  <div class="nav-logo">Bio<span>·</span>Graph</div>
  <ul class="nav-links">
    <li><a href="../index.html">主页</a></li>
    <li><a href="../learn.html">学习</a></li>
    <li><a href="biology1conclusion.pdf" target="_blank">PDF</a></li>
  </ul>
</nav>

<div class="title-overlay">
  <h1><strong>生物必修一</strong> · 知识图谱</h1>
</div>

<div id="network-container"></div>

<div class="legend">
  <div class="legend-item"><span class="legend-dot core"></span>核心主题</div>
  <div class="legend-item"><span class="legend-dot concept"></span>基本概念</div>
  <div class="legend-item"><span class="legend-dot detail"></span>细分知识</div>
  <div class="legend-item"><span class="legend-dot process"></span>生理过程</div>
  <div class="legend-item"><span class="legend-dot structure"></span>细胞结构</div>
</div>

<div class="info-panel">
  <p>拖拽节点 · 滚轮缩放 · 点击查看关联</p>
</div>

<script>
const glow=document.getElementById('cursor-glow');
let gx=-200,gy=-200,tx=-200,ty=-200;
document.addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY;});
(function ani(){gx+=(tx-gx)*0.06;gy+=(ty-gy)*0.06;glow.style.left=gx+'px';glow.style.top=gy+'px';requestAnimationFrame(ani);})();

// ===== Knowledge Graph Data =====
const nodes = [
  { id:'cell', label:'细胞', group:'core', title:'生物学基本单位', size:30 },
  { id:'cellTheory', label:'细胞学说', group:'concept', title:'一切生物体由细胞构成', size:18 },
  { id:'cellTypes', label:'细胞类型', group:'concept', title:'原核细胞 vs 真核细胞', size:18 },
  { id:'prokaryote', label:'原核细胞', group:'detail', title:'无核膜·无膜细胞器·拟核', size:12 },
  { id:'eukaryote', label:'真核细胞', group:'detail', title:'有核膜·有膜细胞器', size:12 },
  { id:'membrane', label:'细胞膜', group:'structure', title:'流动镶嵌模型·选择透过性', size:20 },
  { id:'fluidMosaic', label:'流动镶嵌模型', group:'detail', title:'磷脂双分子层+蛋白质', size:12 },
  { id:'transport', label:'物质跨膜运输', group:'process', title:'被动运输·主动运输·胞吞胞吐', size:20 },
  { id:'passive', label:'被动运输', group:'detail', title:'自由扩散·协助扩散（不耗能）', size:12 },
  { id:'active', label:'主动运输', group:'detail', title:'逆浓度梯度·需载体蛋白·耗能', size:12 },
  { id:'endocytosis', label:'胞吞胞吐', group:'detail', title:'大分子物质进出细胞', size:12 },
  { id:'organelles', label:'细胞器', group:'structure', title:'各种膜结构细胞器', size:18 },
  { id:'mitochondria', label:'线粒体', group:'detail', title:'有氧呼吸主要场所·动力车间', size:12 },
  { id:'chloroplast', label:'叶绿体', group:'detail', title:'光合作用场所', size:12 },
  { id:'ribosome', label:'核糖体', group:'detail', title:'蛋白质合成场所·无膜', size:12 },
  { id:'er', label:'内质网', group:'detail', title:'蛋白质加工和脂质合成', size:12 },
  { id:'golgi', label:'高尔基体', group:'detail', title:'蛋白质加工·分类·包装', size:12 },
  { id:'lysosome', label:'溶酶体', group:'detail', title:'细胞内消化', size:12 },
  { id:'nucleus', label:'细胞核', group:'structure', title:'遗传信息库·细胞代谢控制中心', size:20 },
  { id:'enzyme', label:'酶', group:'concept', title:'生物催化剂·大多数是蛋白质', size:18 },
  { id:'enzymeMechanism', label:'酶的作用机理', group:'detail', title:'降低活化能·锁钥模型·诱导契合', size:12 },
  { id:'enzymeProperties', label:'酶的特性', group:'detail', title:'高效性·专一性·作用条件温和', size:12 },
  { id:'atp', label:'ATP', group:'concept', title:'腺苷三磷酸·直接能源物质', size:18 },
  { id:'atpStructure', label:'ATP结构', group:'detail', title:'A-P~P~P·高能磷酸键', size:12 },
  { id:'atpHydrolysis', label:'ATP水解', group:'detail', title:'ATP→ADP+Pi·放能', size:12 },
  { id:'respiration', label:'细胞呼吸', group:'process', title:'有机物氧化分解·释放能量', size:22 },
  { id:'aerobic', label:'有氧呼吸', group:'detail', title:'C₆H₁₂O₆+6O₂→6CO₂+6H₂O·大量ATP', size:14 },
  { id:'anaerobic', label:'无氧呼吸', group:'detail', title:'C₆H₁₂O₆→2C₃H₆O₃(乳酸)·2ATP', size:14 },
  { id:'glycolysis', label:'糖酵解', group:'detail', title:'细胞质基质·葡萄糖→丙酮酸', size:12 },
  { id:'krebs', label:'三羧酸循环', group:'detail', title:'线粒体基质·产生CO₂和NADH', size:12 },
  { id:'etc', label:'电子传递链', group:'detail', title:'线粒体内膜·大量ATP·需氧', size:12 },
  { id:'photosynthesis', label:'光合作用', group:'process', title:'CO₂+H₂O→(CH₂O)+O₂·叶绿体', size:22 },
  { id:'lightReaction', label:'光反应', group:'detail', title:'类囊体膜·光解水·产生ATP+NADPH', size:14 },
  { id:'darkReaction', label:'暗反应(卡尔文循环)', group:'detail', title:'叶绿体基质·CO₂固定·C₃还原', size:14 },
  { id:'cellCycle', label:'细胞周期', group:'concept', title:'分裂间期+分裂期', size:18 },
  { id:'interphase', label:'分裂间期', group:'detail', title:'G₁→S(DNA复制)→G₂', size:12 },
  { id:'mitosis', label:'有丝分裂', group:'process', title:'前中后末·染色体均分', size:18 },
  { id:'prophase', label:'前期', group:'detail', title:'染色质→染色体·核膜消失', size:10 },
  { id:'metaphase', label:'中期', group:'detail', title:'染色体排列赤道板', size:10 },
  { id:'anaphase', label:'后期', group:'detail', title:'着丝粒分裂·染色体移向两极', size:10 },
  { id:'telophase', label:'末期', group:'detail', title:'染色体→染色质·核膜重现', size:10 },
  { id:'cytokinesis', label:'胞质分裂', group:'detail', title:'细胞质分裂成两个子细胞', size:10 },
];

const edges = [
  { from:'cell', to:'cellTheory', label:'包含' },
  { from:'cell', to:'cellTypes', label:'分为' },
  { from:'cellTypes', to:'prokaryote', label:'包括' },
  { from:'cellTypes', to:'eukaryote', label:'包括' },
  { from:'cell', to:'membrane', label:'结构' },
  { from:'membrane', to:'fluidMosaic', label:'模型' },
  { from:'membrane', to:'transport', label:'功能' },
  { from:'transport', to:'passive', label:'方式' },
  { from:'transport', to:'active', label:'方式' },
  { from:'transport', to:'endocytosis', label:'方式' },
  { from:'cell', to:'organelles', label:'含有' },
  { from:'organelles', to:'mitochondria', label:'包括' },
  { from:'organelles', to:'chloroplast', label:'包括' },
  { from:'organelles', to:'ribosome', label:'包括' },
  { from:'organelles', to:'er', label:'包括' },
  { from:'organelles', to:'golgi', label:'包括' },
  { from:'organelles', to:'lysosome', label:'包括' },
  { from:'cell', to:'nucleus', label:'控制中心' },
  { from:'cell', to:'enzyme', label:'含' },
  { from:'enzyme', to:'enzymeMechanism', label:'机理' },
  { from:'enzyme', to:'enzymeProperties', label:'特性' },
  { from:'cell', to:'atp', label:'能源' },
  { from:'atp', to:'atpStructure', label:'结构' },
  { from:'atp', to:'atpHydrolysis', label:'水解' },
  { from:'atp', to:'respiration', label:'产生' },
  { from:'atp', to:'photosynthesis', label:'产生' },
  { from:'respiration', to:'aerobic', label:'类型' },
  { from:'respiration', to:'anaerobic', label:'类型' },
  { from:'aerobic', to:'glycolysis', label:'阶段1' },
  { from:'aerobic', to:'krebs', label:'阶段2' },
  { from:'aerobic', to:'etc', label:'阶段3' },
  { from:'photosynthesis', to:'lightReaction', label:'阶段1' },
  { from:'photosynthesis', to:'darkReaction', label:'阶段2' },
  { from:'cell', to:'cellCycle', label:'增殖' },
  { from:'cellCycle', to:'interphase', label:'包括' },
  { from:'cellCycle', to:'mitosis', label:'包括' },
  { from:'mitosis', to:'prophase', label:'分期' },
  { from:'mitosis', to:'metaphase', label:'分期' },
  { from:'mitosis', to:'anaphase', label:'分期' },
  { from:'mitosis', to:'telophase', label:'分期' },
  { from:'mitosis', to:'cytokinesis', label:'后续' },
  { from:'nucleus', to:'cellCycle', label:'调控' },
  { from:'nucleus', to:'organelles', label:'指令' },
  { from:'chloroplast', to:'photosynthesis', label:'场所' },
  { from:'mitochondria', to:'respiration', label:'场所' },
];

// ===== vis-network Configuration =====
const container = document.getElementById('network-container');

// Group styling
const groups = {
  core: { shape:'dot', color:{background:'#4dc878',border:'#4dc878',highlight:{background:'#6ae898',border:'#6ae898'}}, font:{color:'#4dc878',size:16} },
  concept: { shape:'dot', color:{background:'#6eb5ff',border:'#6eb5ff',highlight:{background:'#8ec9ff',border:'#8ec9ff'}}, font:{color:'#6eb5ff',size:13} },
  detail: { shape:'dot', color:{background:'#c084fc',border:'#c084fc',highlight:{background:'#d4a0ff',border:'#d4a0ff'}}, font:{color:'#c084fc',size:11} },
  process: { shape:'diamond', color:{background:'#fbbf24',border:'#fbbf24',highlight:{background:'#fcd34d',border:'#fcd34d'}}, font:{color:'#fbbf24',size:14} },
  structure: { shape:'square', color:{background:'#f472b6',border:'#f472b6',highlight:{background:'#f9a8d4',border:'#f9a8d4'}}, font:{color:'#f472b6',size:13} },
};

const data = {
  nodes: new vis.DataSet(nodes.map(n => ({
    ...n,
    group: n.group,
    borderWidth: 1,
    borderWidthSelected: 2,
    font: { ...groups[n.group].font, face:'Segoe UI,PingFang SC,Microsoft YaHei,sans-serif' },
    color: {
      background: groups[n.group].color.background,
      border: groups[n.group].color.border,
      highlight: groups[n.group].color.highlight,
    },
    size: n.size || 15,
    shape: groups[n.group].shape,
  }))),
  edges: new vis.DataSet(edges.map(e => ({
    ...e,
    color: { color:'rgba(255,255,255,0.08)', highlight:'rgba(77,200,120,0.3)', hover:'rgba(77,200,120,0.2)' },
    font: { color:'rgba(255,255,255,0.15)', size:9, strokeWidth:0, face:'Segoe UI,PingFang SC,sans-serif' },
    width: 0.5,
    hoverWidth: 1.5,
    smooth: { type:'continuous' },
  }))),
};

const options = {
  autoResize: true,
  physics: {
    solver: 'forceAtlas2Based',
    forceAtlas2Based: { gravitationalConstant:-40, centralGravity:0.005, springLength:180, springConstant:0.02, damping:0.4 },
    stabilization: { iterations:200, updateInterval:25 },
    maxVelocity: 50,
  },
  interaction: {
    hover: true,
    tooltipDelay: 200,
    navigationButtons: false,
    keyboard: false,
  },
  layout: { improvedLayout: true, randomSeed: 42 },
  edges: { smooth: { type:'continuous' } },
  nodes: { borderWidth: 1, borderWidthSelected: 2 },
};

const network = new vis.Network(container, data, options);

// Stabilization done → remove physics for smooth interaction
network.once('stabilizationIterationsDone', () => {
  network.setOptions({ physics: false });
});

// Click handler: show connected nodes
network.on('click', function(params) {
  if (params.nodes.length > 0) {
    const nodeId = params.nodes[0];
    const connected = network.getConnectedNodes(nodeId);
    const allNodes = data.nodes.get().map(n => n.id);
    const edges = network.getConnectedEdges(nodeId);
    // Dim non-connected nodes
    const highlightIds = new Set([nodeId, ...connected]);
    allNodes.forEach(id => {
      const domNode = document.getElementById(id);
      if (domNode) {
        domNode.style.opacity = highlightIds.has(id) ? '1' : '0.15';
      }
    });
  } else {
    // Reset all
    data.nodes.get().forEach(n => {
      const domNode = document.getElementById(n.id);
      if (domNode) domNode.style.opacity = '1';
    });
  }
});
</script>
</body>
</html>
