const canvas=document.getElementById('particles-canvas'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();
const particles=[];
for(let i=0;i<60;i++){particles.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,r:Math.random()*1.5+0.5})}
function drawParticles(){
  ctx.clearRect(0,0,W,H);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(77,200,120,${0.05+p.r*0.03})`;
    ctx.fill();
  });
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<150){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle=`rgba(77,200,120,${0.008*(1-d/150)})`;ctx.lineWidth=0.3;ctx.stroke();}
    }
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();

const groupStyles={
  c:{shape:'dot',color:'#4dc878',border:'#6ae89a',size:22,level:1},
  o:{shape:'dot',color:'#6eb5ff',border:'#8ec9ff',size:16,level:2},
  d:{shape:'dot',color:'#c084fc',border:'#d4a0ff',size:13,level:3},

  s:{shape:'square',color:'#f472b6',border:'#f9a8d4',size:16,level:2},

const container=document.getElementById('network-container');
const data={
  nodes:new vis.DataSet(nodes.map(n=>({
    ...n,borderWidth:2,borderWidthSelected:3,
    font:{color:'#fff',size:groupStyles[n.group].size+2,face:'Segoe UI,PingFang SC,Microsoft YaHei,sans-serif',strokeWidth:2,strokeColor:'rgba(0,0,0,0.3)'},
    color:{background:groupStyles[n.group].color,border:groupStyles[n.group].border,highlight:{background:groupStyles[n.group].color,border:'#fff'}},
    shadow:{enabled:true,color:'rgba(0,0,0,0.4)',size:8,x:0,y:2},
    shape:groupStyles[n.group].shape,
    shapeProperties:{borderRadius:4},
    size:(n.size||15)+2,
  }))),
  edges:new vis.DataSet(edges.map(e=>({
    ...e,color:{color:'rgba(255,255,255,0.08)',highlight:'rgba(77,200,120,0.5)',hover:'rgba(77,200,120,0.35)',inherit:false},
    font:{color:'rgba(255,255,255,0.1)',size:0},width:0.6,hoverWidth:3,smooth:{type:'continuous'},
  }))),
};
const options={
  autoResize:true,
  physics:{solver:'forceAtlas2Based',forceAtlas2Based:{gravitationalConstant:-30,centralGravity:0.003,springLength:200,springConstant:0.012,damping:0.5},stabilization:{iterations:100,updateInterval:15},maxVelocity:50},
  interaction:{hover:true,tooltipDelay:200,navigationButtons:false,keyboard:false},
  layout:{improvedLayout:true,randomSeed:42},
};
const network=new vis.Network(container,data,options);
network.once('stabilizationIterationsDone',()=>{network.setOptions({physics:false});});

// Detail data for modal
const detailData={c1:{icon:'🔬',title:'走进细胞',subtitle:'第一章',body:'细胞是生命活动的基本单位。细胞学说由施莱登和施旺创立。根据有无核膜为界限的细胞核分为真核细胞和原核细胞。'},c1a:{icon:'📜',title:'细胞学说',subtitle:'施莱登·施旺',body:'1.细胞是一个有机体，一切动植物都由细胞发育而来。2.细胞是一个相对独立的单位。3.新细胞是由老细胞分裂产生的。揭示了动物和植物的统一性。'},c1b:{icon:'🧬',title:'细胞类型',subtitle:'真核·原核',body:'根据有无核膜为界限的细胞核分类。原核细胞：无核膜、无膜细胞器(只有核糖体)。真核细胞：有核膜、有多种膜细胞器。'},c1b1:{icon:'🦠',title:'原核细胞',subtitle:'无核膜',body:'原核细胞特点：有拟核(环状DNA分子)，只有核糖体一种细胞器，无染色质、无核膜、无核仁。代表：细菌、蓝藻、放线菌、支原体。'},c1b2:{icon:'🧫',title:'真核细胞',subtitle:'有核膜',body:'真核细胞特点：有真正的细胞核(核膜+核仁+染色质)，有各种膜细胞器。代表：动物、植物、真菌。'},c1c:{icon:'📊',title:'生命系统层次',subtitle:'细胞到生物圈',body:'层次：细胞→组织→器官→系统→个体→种群→群落→生态系统→生物圈。植物没有系统层次。'},c2a1:{icon:'💧',title:'水',subtitle:'结合水·自由水',body:'结合水：细胞结构的重要组成部分。自由水：①细胞内良好溶剂 ②提供液体环境 ③参与生化反应 ④参与物质运输。结合水比例越高→抗逆性越强；自由水比例越高→代谢越快。'},c2a2:{icon:'🧂',title:'无机盐',subtitle:'离子形式',body:'主要以离子形式存在。作用：a)细胞重要组成 b)维持生命活动 c)维持酸碱平衡和渗透压。缺Mg→叶绿素合成减少；缺Fe→贫血；缺Ca→抽搐。'},c2b1:{icon:'🍬',title:'糖类',subtitle:'主要能源物质',body:'单糖：葡萄糖(主要能源)、果糖、半乳糖、核糖、脱氧核糖。二糖：蔗糖、麦芽糖(植物)、乳糖(动物)。多糖：淀粉(储能)、纤维素(细胞壁)、糖原(动物储能)、几丁质。'},c2b2:{icon:'🫒',title:'脂质',subtitle:'脂肪·磷脂·固醇',body:'脂肪：良好储能物质，保温缓冲减压。磷脂：构成生物膜。固醇：胆固醇(动物细胞膜)、性激素、维生素D(促进钙磷吸收)。'},c2b3:{icon:'🧩',title:'蛋白质',subtitle:'生命活动承担者',body:'功能：①构成结构 ②催化 ③运输 ④免疫 ⑤调节。基本单位：氨基酸。必需氨基酸人体不能合成。结构多样原因：氨基酸种类/数目/排列顺序不同，空间结构不同。'},c2b4:{icon:'🧬',title:'核酸',subtitle:'遗传信息携带者',body:'DNA主要分布细胞核(真核)，少量线粒体叶绿体。RNA主要分布细胞质。病毒由DNA/RNA+蛋白质构成，无细胞结构。DNA病毒：HPV；RNA病毒：新冠、HIV。'},c3a:{icon:'🫧',title:'细胞膜',subtitle:'流动镶嵌模型',body:'功能：①将细胞与外界分隔 ②控制物质进出 ③信息交流。特性：选择透过性、流动性。磷脂双分子层是基本支架。糖被一侧是细胞膜外侧。'},c3b1:{icon:'⚡',title:'线粒体',subtitle:'动力车间',body:'有氧呼吸主要场所，提供95%ATP。双层膜，内膜形成嵴。基质含DNA/RNA/核糖体。半自主细胞器。'},c3b2:{icon:'🌿',title:'叶绿体',subtitle:'光合作用场所',body:'仅存在于植物绿色部分。双层膜，类囊体堆叠形成基粒。含光合色素和酶。半自主细胞器。'},c3b3:{icon:'🔵',title:'核糖体',subtitle:'蛋白质合成',body:'无膜结构，由rRNA+蛋白质组成。游离核糖体→胞内蛋白，附着核糖体→分泌蛋白。'},c3b4:{icon:'🔄',title:'内质网',subtitle:'加工·脂质合成',body:'粗面内质网：对蛋白质进行加工折叠糖基化。光面内质网：合成脂质(磷脂、性激素)，解毒(肝细胞)。'},c3b5:{icon:'📮',title:'高尔基体',subtitle:'加工·分类·包装',body:'对内质网蛋白质进一步加工分类包装。参与植物细胞壁形成(合成纤维素)，参与动物分泌物分泌。'},c3b6:{icon:'🧹',title:'溶酶体',subtitle:'消化车间',body:'含多种水解酶。分解衰老损伤细胞器，吞噬杀死侵入的病毒细菌。'},c3b7:{icon:'💧',title:'液泡',subtitle:'渗透调节',body:'成熟植物细胞有大液泡。调节细胞内环境，维持细胞形态(植物)，储存营养物质和色素，参与渗透吸水。'},c3b8:{icon:'⭐',title:'中心体',subtitle:'有丝分裂相关',body:'由两个互相垂直的中心粒组成。发出星射线形成纺锤体。存在于动物和低等植物细胞。'},c3c:{icon:'🧠',title:'细胞核',subtitle:'遗传信息库',body:'控制细胞代谢和遗传。核膜(双层膜+核孔)、核仁(与核糖体形成有关)、染色质(DNA+蛋白质)。染色质和染色体是同一物质不同状态。'},c4a1:{icon:'💨',title:'自由扩散',subtitle:'简单扩散',body:'物质通过简单扩散进入细胞。实例：O₂、CO₂、水、尿素、苯、甘油、乙醇。不需要载体蛋白，不消耗能量。'},c4a2:{icon:'🚪',title:'协助扩散',subtitle:'需转运蛋白',body:'借助转运蛋白进出细胞的扩散方式。实例：葡萄糖进入红细胞、水(水通道蛋白)、K/Na进入神经细胞。载体蛋白和通道蛋白具有专一性。'},c4b:{icon:'⚡',title:'主动运输',subtitle:'逆浓度·耗能',body:'逆浓度梯度运输，需要载体蛋白协助，消耗细胞内化学反应释放的能量(ATP)。'},c4c:{icon:'📦',title:'胞吞胞吐',subtitle:'大分子运输',body:'大分子物质进出细胞的方式。需要消耗能量，需与细胞膜上受体蛋白结合。体现了细胞膜的流动性。'},c5a1:{icon:'⚙️',title:'酶作用机理',subtitle:'降低活化能',body:'活化能：分子从常态转变为活跃状态所需能量。酶通过显著降低化学反应活化能来加快反应速率。模型：锁钥模型、诱导契合模型。'},c5a2:{icon:'📊',title:'酶的特性',subtitle:'高效·专一·温和',body:'①高效性：催化效率极高 ②专一性：只能催化一种或一类反应 ③作用条件温和：需适宜pH和温度。过酸/过碱/高温使酶失活。'},c5b:{icon:'🔋',title:'ATP',subtitle:'直接能源物质',body:'结构简式 A-P~P~P(两个高能磷酸键)。ATP合成伴随放能反应(呼吸、光合光反应)，ATP水解伴随吸能反应。载体蛋白消耗ATP进行主动运输→磷酸化。'},c5c1:{icon:'💨',title:'有氧呼吸',subtitle:'三个阶段',body:'①糖酵解(细胞质基质)：C6H12O6→2C3H4O3+4[H]+少量ATP。②柠檬酸循环(线粒体基质)：2C3H4O3+6H2O→6CO2+20[H]+少量ATP。③电子传递链(线粒体内膜)：24[H]+6O2→12H2O+大量ATP。'},c5c2:{icon:'🫁',title:'无氧呼吸',subtitle:'不彻底氧化',body:'乳酸发酵：C6H12O6→2C3H6O3(乳酸)+少量ATP(动物/乳酸菌/马铃薯块茎)。酒精发酵：C6H12O6→2C2H5OH+2CO2+少量ATP(酵母菌/高等植物)。全程在细胞质基质进行。'},c5d1:{icon:'☀️',title:'光反应',subtitle:'类囊体膜',body:'场所：叶绿体类囊体膜。光解水→O₂+[H]，合成ATP和NADPH。产物传递给暗反应。'},c5d2:{icon:'🌙',title:'暗反应',subtitle:'卡尔文循环',body:'场所：叶绿体基质。CO₂固定：CO₂+C₅→2C₃。C₃还原：C₃+ATP+NADPH→(CH₂O)+C₅。需要光反应提供ATP和NADPH。'},c6a1:{icon:'⏳',title:'细胞周期',subtitle:'间期+分裂期',body:'连续分裂的细胞：一次分裂完成到下一次分裂完成。包括分裂间期(90%~95%)和分裂期(5%~10%)。间期：G₁→S(DNA复制)→G₂。'},c6a2:{icon:'🧬',title:'有丝分裂',subtitle:'染色体均分',body:'间期：DNA复制和蛋白质合成。前期：染色质→染色体，核膜消失，纺锤体形成。中期：染色体排列赤道板(最佳观察期)。后期：着丝粒分裂，姐妹染色单体分开。末期：染色体→染色质，核膜重现。意义：精确均分染色体，保持遗传稳定性。'},c6b:{icon:'🎯',title:'细胞分化',subtitle:'基因选择性表达',body:'由一个或一种细胞增殖产生的后代在形态结构和生理功能上发生稳定性差异的过程。基因选择性表达的结果。管家基因(所有细胞表达)和奢侈基因(特定细胞表达)。细胞全能性：已分化细胞仍具有产生完整有机体的潜能。'},c6c:{icon:'⌛',title:'衰老和死亡',subtitle:'凋亡·自噬',body:'衰老特征：①水分减少体积变小 ②多种酶活性降低 ③色素积累 ④核体积增大 ⑤膜通透性改变。细胞凋亡：基因决定的程序性死亡。细胞自噬：溶酶体降解受损细胞结构。'},c2:{icon:'🧪',title:'组成细胞的分子',subtitle:'第二章',body:'大量元素：C/H/O/N/P/S/K/Ca/Mg。微量元素：Fe/Mn/Zn/Cu/B/Mo。鲜重最多是水，干重最多是蛋白质。'},c2a:{icon:'💧',title:'无机物',subtitle:'水和无机盐',body:'细胞中无机物包括水和无机盐。水有结合水和自由水两种形式。无机盐主要以离子形式存在。'},c2b:{icon:'🧬',title:'有机物',subtitle:'糖·脂·蛋白·核酸',body:'四大有机物：糖类(能源)、脂质(储能)、蛋白质(功能执行者)、核酸(遗传信息)。'},c3:{icon:'🏗️',title:'细胞基本结构',subtitle:'第三章',body:'细胞膜(边界)+细胞器(功能)+细胞核(控制中心)。细胞骨架由蛋白质纤维组成。'},c3b:{icon:'🔧',title:'细胞器',subtitle:'分工合作',body:'动植物共有：线粒体、核糖体、内质网、高尔基体、溶酶体、液泡。植物特有：叶绿体。'},c4:{icon:'🚚',title:'物质跨膜运输',subtitle:'第四章',body:'被动运输(顺浓度/不耗能)、主动运输(逆浓度/耗能)、胞吞胞吐(大分子)。'},c4a:{icon:'🌊',title:'被动运输',subtitle:'顺浓度·不耗能',body:'包括自由扩散和协助扩散。共同点：顺浓度梯度运输，不需要消耗能量。'},c5:{icon:'⚡',title:'细胞能量供应',subtitle:'第五章',body:'酶降低活化能催化反应。ATP是直接能源物质。细胞呼吸和光合作用是能量转化核心。'},c5a:{icon:'🔑',title:'酶',subtitle:'降低活化能',body:'活细胞产生的催化剂，绝大多数是蛋白质，少数是RNA。显著降低化学反应活化能。'},c5c:{icon:'🌬️',title:'细胞呼吸',subtitle:'氧化分解',body:'有机物氧化分解释放能量并生成ATP。有氧呼吸(需氧)和无氧呼吸(不需氧)两种类型。'},c5d:{icon:'☀️',title:'光合作用',subtitle:'光反应+暗反应',body:'6CO₂+12H₂O→C₆H₁₂O₆+6O₂+6H₂O。光反应和暗反应两个阶段。真正光合速率=净光合速率+呼吸速率。'},c6:{icon:'🔄',title:'细胞生命历程',subtitle:'第六章',body:'细胞通过增殖增加数量，通过分化形成不同组织，最终走向衰老和死亡。'},c6a:{icon:'📈',title:'细胞增殖',subtitle:'增加数量',body:'细胞通过分裂增加数量。方式：有丝分裂(体细胞)、无丝分裂、减数分裂(生殖细胞)。'},};


const overlay=document.getElementById('modalOverlay');
const closeBtn=document.getElementById('modalClose');
const mIcon=document.getElementById('modalIcon');
const mTitle=document.getElementById('modalName');
const mSub=document.getElementById('modalSub');
const mBody=document.getElementById('modalBody');

network.on('click',function(params){
  if(params.nodes.length>0){
    const id=params.nodes[0];
    const info=detailData[id];
    if(info){
      mIcon.textContent=info.icon;
      mTitle.textContent=info.title;
      mSub.textContent=info.subtitle;
      let subHtml='';
      if(info.sub){
        subHtml='<div class="modal-sub-topics">';
        info.sub.forEach(s=>{subHtml+='<div class="modal-sub-item"><span class="label">'+s.label+'</span><br><span style="color:rgba(255,255,255,0.4);font-size:0.78rem">'+s.desc+'</span></div>';});
        subHtml+='</div>';
      }
      mBody.innerHTML=info.body+subHtml;
      overlay.classList.add('show');
    }
  }
});
closeBtn.addEventListener('click',()=>overlay.classList.remove('show'));
overlay.addEventListener('click',(e)=>{if(e.target===overlay)overlay.classList.remove('show');});
document.addEventListener('keydown',(e)=>{if(e.key==='Escape')overlay.classList.remove('show');});

// Breathing node animation
const baseSizes={};nodes.forEach(n=>{baseSizes[n.id]=n.size});
let breathT=0;
setInterval(()=>{
  breathT+=0.06;
  const offset=Math.sin(breathT)*2.5;
  nodes.forEach(n=>{
    const bs=baseSizes[n.id];
    if(bs>13){data.nodes.update({id:n.id,size:bs+offset,borderWidth:2+Math.sin(breathT+1)*0.8});}
  });
},80);
</script>
</body>
