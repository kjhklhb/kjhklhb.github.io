<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绔嬩綋鍑犱綍妯℃嫙 - 杩囩洿绾縩浣滃钩闈笌尾鍨傜洿/骞宠</title>
    <style>
        :root {
            --bg: #0a0e17;
            --panel-bg: rgba(12, 16, 28, 0.92);
            --text: #e0e4ee;
            --accent: #4da6ff;
            --accent2: #ff6b6b;
            --green: #4cff88;
            --yellow: #ffcc33;
            --purple: #b066ff;
            --slider-track: #1e2a3e;
            --border: rgba(255, 255, 255, 0.06);
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover: rgba(77, 166, 255, 0.15);
            --btn-active: rgba(77, 166, 255, 0.25);
        }

        /* ===== NOISE OVERLAY ===== */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E\");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        #app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        #canvas-wrapper {
            flex: 1;
            min-width: 0;
            position: relative;
            cursor: grab;
            background: radial-gradient(ellipse at center, #141c2a 0%, #080b12 100%);
        }
        #canvas-wrapper:active {
            cursor: grabbing;
        }
        #canvas-wrapper canvas {
            display: block;
        }

        #panel {
            width: 380px;
            min-width: 380px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 10;
            padding: 24px 20px;
            gap: 14px;
            box-shadow: -8px 0 40px rgba(0, 0, 0, 0.6);
        }

        #panel h2 {
            font-size: 1.3em;
            font-weight: 700;
            color: #fff;
            text-align: center;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        #panel .subtitle {
            font-size: 0.8em;
            color: #8899bb;
            text-align: center;
            margin-top: -8px;
        }

        .section-label {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8899bb;
            margin-bottom: -8px;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .btn-group button {
            flex: 1;
            min-width: 55px;
            padding: 12px 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            color: #99aacb;
            cursor: pointer;
            font-size: 0.82em;
            font-weight: 500;
            transition: all 0.25s ease;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .btn-group button:hover {
            background: var(--btn-hover);
            border-color: rgba(77, 166, 255, 0.3);
            color: #fff;
            transform: translateY(-1px);
        }
        .btn-group button.active {
            background: rgba(77, 166, 255, 0.15);
            border-color: rgba(77, 166, 255, 0.4);
            color: #fff;
            box-shadow: 0 4px 20px rgba(77, 166, 255, 0.15);
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .slider-group .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85em;
            font-weight: 500;
        }
        .slider-group .slider-header .val {
            color: var(--accent);
            font-weight: 700;
            font-size: 0.9em;
            min-width: 40px;
            text-align: right;
        }
        .slider-group input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--slider-track);
            outline: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid var(--accent);
            cursor: pointer;
            box-shadow: 0 0 12px rgba(77, 166, 255, 0.3);
            transition: transform 0.2s;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        .indicator-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .indicator-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
            box-shadow: 0 0 8px currentColor;
        }
        .indicator-dot.green {
            background: #4cff88;
            box-shadow: 0 0 12px #4cff88;
        }
        .indicator-dot.yellow {
            background: #ffcc33;
            box-shadow: 0 0 12px #ffcc33;
        }
        .indicator-dot.purple {
            background: #b066ff;
            box-shadow: 0 0 12px #b066ff;
        }
        .indicator-text {
            font-size: 0.82em;
            font-weight: 500;
        }
        .highlight-box {
            padding: 10px 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9em;
            text-align: center;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }
        .highlight-box.perp {
            background: rgba(76, 255, 136, 0.15);
            border: 2px solid #4cff88;
            color: #4cff88;
        }
        .highlight-box.parallel {
            background: rgba(176, 102, 255, 0.15);
            border: 2px solid #b066ff;
            color: #b066ff;
        }
        .highlight-box.none {
            background: rgba(255, 200, 50, 0.1);
            border: 2px solid #ffcc33;
            color: #ffcc33;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 0.8em;
            line-height: 1.55;
            border: 1px solid var(--border);
            color: #bcc8dd;
        }
        .info-card strong {
            color: #fff;
        }
        .info-card .correct {
            color: #4cff88;
            font-weight: 700;
        }
        .info-card .wrong {
            color: #ff6b6b;
            font-weight: 700;
        }

        .legend-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.75em;
            align-items: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend-swatch {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        @media (max-width: 800px) {
            #app-container {
                flex-direction: column;
            }
            #panel {
                width: 100%;
                min-width: 0;
                max-height: 46vh;
                border-left: none;
                border-top: 1px solid var(--border);
                padding: 14px 12px;
                gap: 10px;
                box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.4);
            }
            #canvas-wrapper {
                flex: 1;
                min-height: 300px;
            }
            #panel h2 {
                font-size: 1.1em;
            }
            .btn-group button {
                font-size: 0.75em;
                padding: 8px 5px;
            }
            .slider-group {
                gap: 2px;
            }
            .info-card {
                font-size: 0.72em;
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="canvas-wrapper"></div>
        <div id="panel">
            <h2>馃搻 绔嬩綋鍑犱綍妯℃嫙</h2>
            <p class="subtitle">m鈯 &nbsp;|&nbsp; 伪//尾 &nbsp;|&nbsp; 杩噉浣滃钩闈⑽崇粫n鏃嬭浆</p>

            <div class="section-label">馃斀 閫夋嫨鏉′欢锛堥€夐」锛?/div>
            <div class="btn-group" id="condition-btns">
                <button data-cond="A">閫夐」 A<br><small>m // 伪</small></button>
                <button data-cond="B">閫夐」 B<br><small>m涓幬辨垚60掳</small></button>
                <button data-cond="C" class="active">閫夐」 C<br><small>m 鈯?伪</small></button>
            </div>

            <div class="section-label">馃帤锔?鏃嬭浆杩噉鐨勫钩闈?纬锛堢粫n杞达級</div>
            <div class="slider-group">
                <div class="slider-header"><span>纬鏃嬭浆瑙?胃</span><span class="val" id="theta-val">45掳</span></div>
                <input type="range" id="theta-slider" min="0" max="360" value="45" step="0.5">
            </div>

            <div class="section-label">馃Л n鍦ㄢ姤m骞抽潰鍐呯殑鏂瑰悜 蠁锛堝睍绀轰笉纭畾鎬э級</div>
            <div class="slider-group">
                <div class="slider-header"><span>n鏂瑰悜瑙?蠁</span><span class="val" id="phi-val">0掳</span></div>
                <input type="range" id="phi-slider" min="0" max="360" value="0" step="0.5">
            </div>

            <div class="indicator-row">
                <span class="indicator-dot" id="status-dot" style="background:#ffcc33;box-shadow:0 0 12px #ffcc33;"></span>
                <span class="indicator-text" id="status-text">纬涓幬茬殑鍏崇郴锛氣€?/span>
            </div>
            <div class="highlight-box none" id="highlight-box">鏃嬭浆纬瑙傚療浣曟椂鈯ノ?/div>

            <div class="info-card" id="info-card">
                <strong>褰撳墠鏉′欢鍒嗘瀽锛?/strong><br>
                <span id="analysis-text">鍔犺浇涓€?/span>
            </div>

            <div class="legend-row">
                <span class="legend-item"><span class="legend-swatch" style="background:#ff4444;"></span> m鐩寸嚎</span>
                <span class="legend-item"><span class="legend-swatch" style="background:#4488ff;"></span> n鐩寸嚎</span>
                <span class="legend-item"><span class="legend-swatch" style="background:rgba(100,150,255,0.5);"></span> 伪骞抽潰</span>
                <span class="legend-item"><span class="legend-swatch" style="background:rgba(60,100,220,0.6);"></span> 尾骞抽潰</span>
                <span class="legend-item"><span class="legend-swatch" style="background:#ffcc33;"></span> 纬骞抽潰(杩噉)</span>
            </div>
            <p style="font-size:0.7em;color:#667;text-align:center;">馃柋锔?鎷栨嫿鏃嬭浆瑙嗚 | 婊氳疆缂╂斁 | 鍙抽敭骞崇Щ</p>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==================== DOM鍏冪礌 ====================
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const thetaSlider = document.getElementById('theta-slider');
        const phiSlider = document.getElementById('phi-slider');
        const thetaValEl = document.getElementById('theta-val');
        const phiValEl = document.getElementById('phi-val');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const highlightBox = document.getElementById('highlight-box');
        const analysisText = document.getElementById('analysis-text');
        const conditionBtns = document.querySelectorAll('#condition-btns button');

        // ==================== 鐘舵€?====================
        let currentCondition = 'C'; // 'A' | 'B' | 'C'
        let theta = 45; // 纬缁昻鏃嬭浆瑙掑害锛堝害锛?        let phi = 0; // n鍦ㄢ姤m骞抽潰鍐呯殑鏂瑰悜瑙掞紙搴︼級

        // ==================== Three.js 鍒濆鍖?====================
        const scene = new THREE.Scene();

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(canvasWrapper.clientWidth, canvasWrapper.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        canvasWrapper.appendChild(renderer.domElement);

        const camera = new THREE.PerspectiveCamera(50, canvasWrapper.clientWidth / Math.max(canvasWrapper.clientHeight, 1), 0.5, 40);
        camera.position.set(7, 4.5, 9);
        camera.lookAt(0, 0, 0);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.12;
        controls.minDistance = 3;
        controls.maxDistance = 22;
        controls.maxPolarAngle = Math.PI * 0.85;
        controls.update();

        // ==================== 鍏夌収 ====================
        const ambientLight = new THREE.AmbientLight('#bcc8dd', 2.5);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight('#ffffff', 4);
        sunLight.position.set(8, 14, 6);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 50;
        sunLight.shadow.camera.left = -12;
        sunLight.shadow.camera.right = 12;
        sunLight.shadow.camera.top = 12;
        sunLight.shadow.camera.bottom = -12;
        sunLight.shadow.bias = -0.0001;
        scene.add(sunLight);
        const fillLight = new THREE.DirectionalLight('#8899cc', 1.2);
        fillLight.position.set(-3, 2, -4);
        scene.add(fillLight);

        // ==================== 鍦烘櫙鍏冪礌 ====================
        // 缃戞牸鍦伴潰锛堝弬鑰冿級
        const gridHelper = new THREE.GridHelper(10, 20, '#334466', '#1a2a3a');
        gridHelper.position.y = -1.5;
        scene.add(gridHelper);

        // 灏忕綉鏍煎湪鍘熺偣
        const gridHelper2 = new THREE.GridHelper(6, 12, '#445577', '#1a2a3a');
        gridHelper2.position.y = 0;
        scene.add(gridHelper2);

        // 伪骞抽潰锛堝崐閫忔槑锛寉=-1.5锛?        const alphaGeom = new THREE.PlaneGeometry(9, 9);
        const alphaMat = new THREE.MeshStandardMaterial({
            color: '#6496ff',
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.35,
            roughness: 0.3,
            metalness: 0.05,
            depthWrite: false,
        });
        const alphaPlane = new THREE.Mesh(alphaGeom, alphaMat);
        alphaPlane.position.y = -1.5;
        alphaPlane.rotation.x = -Math.PI / 2;
        alphaPlane.receiveShadow = true;
        alphaPlane.renderOrder = 1;
        scene.add(alphaPlane);

        // 尾骞抽潰锛堝崐閫忔槑锛寉=1.5锛屽钩琛屼簬伪锛?        const betaGeom = new THREE.PlaneGeometry(9, 9);
        const betaMat = new THREE.MeshStandardMaterial({
            color: '#3c64dc',
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.45,
            roughness: 0.25,
            metalness: 0.08,
            depthWrite: false,
        });
        const betaPlane = new THREE.Mesh(betaGeom, betaMat);
        betaPlane.position.y = 1.5;
        betaPlane.rotation.x = -Math.PI / 2;
        betaPlane.receiveShadow = true;
        betaPlane.renderOrder = 2;
        scene.add(betaPlane);

        // 纬骞抽潰锛堣繃n锛岀粫n鏃嬭浆锛? 灏嗗湪update涓姩鎬佽缃?        const gammaGeom = new THREE.PlaneGeometry(5.5, 5.5);
        const gammaMat = new THREE.MeshStandardMaterial({
            color: '#ffcc33',
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.5,
            roughness: 0.35,
            metalness: 0.1,
            depthWrite: false,
        });
        const gammaPlane = new THREE.Mesh(gammaGeom, gammaMat);
        gammaPlane.renderOrder = 3;
        gammaPlane.castShadow = false;
        gammaPlane.receiveShadow = true;
        scene.add(gammaPlane);

        // 纬骞抽潰鐨勮竟妗嗭紙绾挎锛?        const gammaEdgeGeom = new THREE.EdgesGeometry(gammaGeom);
        const gammaEdgeMat = new THREE.LineBasicMaterial({
            color: '#ffaa00',
            transparent: true,
            opacity: 0.7,
            depthTest: true,
        });
        const gammaEdge = new THREE.LineSegments(gammaEdgeGeom, gammaEdgeMat);
        gammaPlane.add(gammaEdge);

        // ==================== 杈呭姪鍑芥暟锛氬垱寤虹洿绾匡紙鍦嗘煴浣擄級 ====================
        function createLineCylinder(start, end, radius, colorHex, opacity = 1) {
            const dir = new THREE.Vector3().subVectors(end, start);
            const length = dir.length();
            const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
            const geom = new THREE.CylinderGeometry(radius, radius, length, 20, 1);
            const mat = new THREE.MeshStandardMaterial({
                color: colorHex,
                roughness: 0.3,
                metalness: 0.2,
                transparent: opacity < 1,
                opacity: opacity,
                depthTest: true,
            });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.copy(mid);
            // 榛樿鍦嗘煴娌縴杞达紝鏃嬭浆鍒癲ir鏂瑰悜
            const yAxis = new THREE.Vector3(0, 1, 0);
            const q = new THREE.Quaternion().setFromUnitVectors(yAxis, dir.normalize());
            mesh.setRotationFromQuaternion(q);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            return mesh;
        }

        // ==================== 鍔ㄦ€佸璞″鍣?====================
        const dynamicGroup = new THREE.Group();
        scene.add(dynamicGroup);

        // 褰撳墠m鍜宯鐨勭綉鏍煎紩鐢?        let mLineMesh = null;
        let nLineMesh = null;

        // 灏忕悆鏍囪n涓婄殑鐐?        const sphereGeomSmall = new THREE.SphereGeometry(0.15, 24, 24);
        const sphereMatN = new THREE.MeshStandardMaterial({ color: '#4488ff', roughness: 0.2, metalness: 0.3 });
        const nPointSphere = new THREE.Mesh(sphereGeomSmall, sphereMatN);
        nPointSphere.castShadow = true;
        dynamicGroup.add(nPointSphere);

        const sphereMatM = new THREE.MeshStandardMaterial({ color: '#ff4444', roughness: 0.2, metalness: 0.3 });
        const mPointSphere = new THREE.Mesh(sphereGeomSmall, sphereMatM);
        mPointSphere.castShadow = true;
        dynamicGroup.add(mPointSphere);

        // ==================== 绠ご鏍囪尾鐨勬硶鍚戦噺鏂瑰悜 ====================
        function createSmallArrow(from, direction, length, colorHex) {
            const group = new THREE.Group();
            const shaftGeom = new THREE.CylinderGeometry(0.06, 0.06, length * 0.75, 12);
            const shaftMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.3, metalness: 0.2 });
            const shaft = new THREE.Mesh(shaftGeom, shaftMat);
            shaft.position.y = length * 0.375;
            shaft.castShadow = true;
            group.add(shaft);

            const headGeom = new THREE.ConeGeometry(0.14, length * 0.3, 12);
            const headMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.3, metalness: 0.2 });
            const head = new THREE.Mesh(headGeom, headMat);
            head.position.y = length * 0.75 + length * 0.15;
            head.castShadow = true;
            group.add(head);

            group.position.copy(from);
            const yAxis = new THREE.Vector3(0, 1, 0);
            const q = new THREE.Quaternion().setFromUnitVectors(yAxis, direction.normalize());
            group.setRotationFromQuaternion(q);
            return group;
        }

        let betaNormalArrow = null;
        const betaNormalDir = new THREE.Vector3(0, 1, 0); // 尾鐨勬硶鍚戦噺娌縴杞?
        function updateBetaNormalArrow() {
            if (betaNormalArrow) {
                dynamicGroup.remove(betaNormalArrow);
                // 閫掑綊娓呯悊
                betaNormalArrow.traverse(c => {
                    if (c.geometry && c !== betaNormalArrow) c.geometry.dispose();
                    if (c.material) {
                        if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
                        else c.material.dispose();
                    }
                });
            }
            betaNormalArrow = createSmallArrow(
                new THREE.Vector3(0, 1.5, 2.8),
                betaNormalDir.clone(),
                1.2,
                '#88aaff'
            );
            betaNormalArrow.renderOrder = 10;
            dynamicGroup.add(betaNormalArrow);
        }
        updateBetaNormalArrow();

        // ==================== 璁＄畻鍑芥暟 ====================
        function getMDirection(condition, phiLocal) {
            // 杩斿洖m鐨勫崟浣嶆柟鍚戝悜閲?            const phiRad = THREE.MathUtils.degToRad(phiLocal);
            if (condition === 'C') {
                // m鈯ノ憋紝伪娉曞悜閲忔部y杞达紝鎵€浠娌縴杞?                return new THREE.Vector3(0, 1, 0);
            } else if (condition === 'A') {
                // m//伪锛屛辨槸姘村钩闈?y=const)锛宮鍦▁z骞抽潰鍐?                // n鍦ㄥ瀭鐩翠簬m鐨勫钩闈㈠唴锛岀敱phi鍙傛暟鍖?                // 璁惧畾m鍦▁z骞抽潰锛屾柟鍚戦渶瑕佲姤n
                // n鐢眕hi鍐冲畾锛歯鍦▁y骞抽潰鍐咃紙鍨傜洿浜巣杞寸殑鏂瑰悜涓嶅浐瀹氾級
                // 涓轰簡涓€鑷存€э紝鍦ㄦ潯浠禔涓紝n鍦▁y骞抽潰鍐咃細(cos(phi), sin(phi), 0)
                // m鍦▁z骞抽潰涓斺姤n锛歮路n = m_x*cos(phi) + 0*sin(phi) + m_z*0 = m_x*cos(phi)=0
                const cosPhi = Math.cos(phiRad);
                if (Math.abs(cosPhi) < 0.001) {
                    // n娌縴杞达紝m鍦▁z骞抽潰浠绘剰锛岄€墄杞?                    return new THREE.Vector3(1, 0, 0);
                }
                // m娌縵杞达紙鍦▁z骞抽潰涓斺姤n锛?                return new THREE.Vector3(0, 0, 1);
            } else if (condition === 'B') {
                // m涓幬辨垚60掳锛屛辨槸姘村钩闈?                // m鍦▂z骞抽潰鍐咃紝涓巠杞存垚30掳锛堜笌姘村钩闈㈡垚60掳锛?                const mRef = new THREE.Vector3(0, Math.cos(Math.PI / 6), Math.sin(Math.PI / 6)).normalize();
                return mRef;
            }
            return new THREE.Vector3(0, 1, 0);
        }

        function getNDirection(condition, phiLocal, mDir) {
            // n鈯锛屽湪鍨傜洿浜巑鐨勫钩闈㈠唴鐢眕hi鍙傛暟鍖?            const phiRad = THREE.MathUtils.degToRad(phiLocal);
            // 鍦ㄢ姤m鐨勫钩闈㈠唴鎵句袱涓浜ゅ熀
            const mNorm = mDir.clone().normalize();
            // 鎵剧涓€涓熀鍚戦噺u锛堚姤m锛?            let u = new THREE.Vector3(1, 0, 0);
            if (Math.abs(u.dot(mNorm)) > 0.95) {
                u = new THREE.Vector3(0, 0, 1);
            }
            // u鍦ㄢ姤m骞抽潰鍐呯殑鎶曞奖
            u = u.clone().sub(mNorm.clone().multiplyScalar(u.dot(mNorm))).normalize();
            const v = new THREE.Vector3().crossVectors(mNorm, u).normalize();
            // n = cos(phi)*u + sin(phi)*v
            const nDir = u.clone().multiplyScalar(Math.cos(phiRad)).add(v.clone().multiplyScalar(Math.sin(phiRad)));
            return nDir.normalize();
        }

        function getGammaNormal(nDir, thetaLocal) {
            // 纬鐨勬硶鍚戦噺鍦ㄥ瀭鐩翠簬nDir鐨勫钩闈㈠唴锛岀敱theta鍙傛暟鍖?            const thetaRad = THREE.MathUtils.degToRad(thetaLocal);
            const nNorm = nDir.clone().normalize();
            let u = new THREE.Vector3(0, 1, 0);
            if (Math.abs(u.dot(nNorm)) > 0.95) {
                u = new THREE.Vector3(1, 0, 0);
            }
            u = u.clone().sub(nNorm.clone().multiplyScalar(u.dot(nNorm))).normalize();
            const v = new THREE.Vector3().crossVectors(nNorm, u).normalize();
            const gammaN = u.clone().multiplyScalar(Math.cos(thetaRad)).add(v.clone().multiplyScalar(Math.sin(thetaRad)));
            return gammaN.normalize();
        }

        // ==================== 鏇存柊鍦烘櫙 ====================
        function updateScene() {
            // 娓呯悊鏃х洿绾?            if (mLineMesh) {
                dynamicGroup.remove(mLineMesh);
                mLineMesh.traverse(c => {
                    if (c.geometry && c !== mLineMesh) c.geometry.dispose();
                    if (c.material) {
                        if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
                        else c.material.dispose();
                    }
                });
                mLineMesh = null;
            }
            if (nLineMesh) {
                dynamicGroup.remove(nLineMesh);
                nLineMesh.traverse(c => {
                    if (c.geometry && c !== nLineMesh) c.geometry.dispose();
                    if (c.material) {
                        if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
                        else c.material.dispose();
                    }
                });
                nLineMesh = null;
            }

            const mDir = getMDirection(currentCondition, phi);
            const nDir = getNDirection(currentCondition, phi, mDir);
            const gammaN = getGammaNormal(nDir, theta);

            // 鍘熺偣
            const origin = new THREE.Vector3(0, 0, 0);

            // m鐩寸嚎锛堜粠鍘熺偣娌縨Dir寤朵几锛岄暱搴?锛?            const mStart = origin.clone().addScaledVector(mDir, -2.5);
            const mEnd = origin.clone().addScaledVector(mDir, 2.5);
            mLineMesh = createLineCylinder(mStart, mEnd, 0.09, '#ff4444', 1);
            mLineMesh.renderOrder = 5;
            dynamicGroup.add(mLineMesh);

            // n鐩寸嚎锛堜粠鍘熺偣娌縩Dir寤朵几锛岄暱搴?锛?            const nStart = origin.clone().addScaledVector(nDir, -3);
            const nEnd = origin.clone().addScaledVector(nDir, 3);
            nLineMesh = createLineCylinder(nStart, nEnd, 0.09, '#4488ff', 1);
            nLineMesh.renderOrder = 5;
            dynamicGroup.add(nLineMesh);

            // 鏇存柊鏍囪鐞?            nPointSphere.position.copy(origin);
            mPointSphere.position.copy(origin);

            // 鏇存柊纬骞抽潰
            gammaPlane.position.copy(origin);
            const defaultNormal = new THREE.Vector3(0, 0, 1);
            const qGamma = new THREE.Quaternion().setFromUnitVectors(defaultNormal, gammaN);
            gammaPlane.setRotationFromQuaternion(qGamma);

            // 妫€娴嬑充笌尾鐨勫叧绯?            const betaN = new THREE.Vector3(0, 1, 0); // 尾鐨勬硶鍚戦噺
            const dotVal = Math.abs(gammaN.dot(betaN));
            const isPerp = dotVal < 0.025; // 纬鈯ノ?(娉曞悜閲忓瀭鐩?
            const isParallel = dotVal > 0.975; // 纬//尾 (娉曞悜閲忓钩琛?

            // 鏇存柊纬棰滆壊
            let gammaColor, gammaOpacity;
            if (isPerp) {
                gammaColor = '#4cff88';
                gammaOpacity = 0.6;
                gammaMat.color.set(gammaColor);
                gammaMat.opacity = gammaOpacity;
                gammaEdgeMat.color.set('#22dd55');
                gammaEdgeMat.opacity = 0.9;
                statusDot.style.background = '#4cff88';
                statusDot.style.boxShadow = '0 0 16px #4cff88';
                statusText.textContent = '纬鈯ノ?鉁?骞抽潰纬涓幬插瀭鐩?;
                highlightBox.className = 'highlight-box perp';
                highlightBox.textContent = '鉁?纬 鈯?尾 鈥?杩噉鐨勫钩闈笌尾鍨傜洿锛?;
            } else if (isParallel) {
                gammaColor = '#b066ff';
                gammaOpacity = 0.55;
                gammaMat.color.set(gammaColor);
                gammaMat.opacity = gammaOpacity;
                gammaEdgeMat.color.set('#8844dd');
                gammaEdgeMat.opacity = 0.9;
                statusDot.style.background = '#b066ff';
                statusDot.style.boxShadow = '0 0 16px #b066ff';
                statusText.textContent = '纬//尾 鈥?骞抽潰纬涓幬插钩琛?;
                highlightBox.className = 'highlight-box parallel';
                highlightBox.textContent = '馃煟 纬 // 尾 鈥?杩噉鐨勫钩闈笌尾骞宠锛?;
            } else {
                gammaColor = '#ffcc33';
                gammaOpacity = 0.5;
                gammaMat.color.set(gammaColor);
                gammaMat.opacity = gammaOpacity;
                gammaEdgeMat.color.set('#ffaa00');
                gammaEdgeMat.opacity = 0.7;
                statusDot.style.background = '#ffcc33';
                statusDot.style.boxShadow = '0 0 12px #ffcc33';
                statusText.textContent =
                    `纬涓幬茬殑鍏崇郴锛氬す瑙?${Math.round(THREE.MathUtils.radToDeg(Math.acos(Math.min(dotVal, 1))))}掳锛堟硶鍚戦噺澶硅 ${Math.round(THREE.MathUtils.radToDeg(Math.acos(Math.min(dotVal, 1))))}掳锛塦;
                highlightBox.className = 'highlight-box none';
                highlightBox.textContent = '馃煛 鏃嬭浆纬锛岃瀵熶綍鏃朵笌尾鍨傜洿鎴栧钩琛?;
            }
            gammaMat.needsUpdate = true;
            gammaEdgeMat.needsUpdate = true;

            // 鏇存柊n涓幬叉硶鍚戦噺鐨勫叧绯讳俊鎭?            const nDotBetaN = Math.abs(nDir.dot(betaN));
            const nIsParallelToBetaN = nDotBetaN > 0.975;
            const nIsPerpToBetaN = nDotBetaN < 0.025;

            // 鏇存柊瑙ｆ瀽鏂囧瓧
            updateAnalysis(mDir, nDir, gammaN, isPerp, isParallel, nIsParallelToBetaN, nIsPerpToBetaN, dotVal);

            // 鏇存柊鏍囩鏄剧ず
            thetaValEl.textContent = Math.round(theta) + '掳';
            phiValEl.textContent = Math.round(phi) + '掳';
        }
