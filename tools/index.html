<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>工具箱 · Tools</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:"Segoe UI","PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  background:#0a0a0a;color:#e0e4ee;overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
body::after{
  content:'';position:fixed;inset:0;z-index:9999;
  pointer-events:none;opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:256px 256px;
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
#cursor-glow{
  position:fixed;width:420px;height:420px;border-radius:50%;
  background:radial-gradient(circle at center,rgba(230,126,34,0.06),transparent 70%);
  pointer-events:none;z-index:1;transform:translate(-50%,-50%);
}
nav{
  position:fixed;top:0;left:0;width:100%;z-index:1000;
  padding:24px 48px;display:flex;justify-content:space-between;
  align-items:center;transition:background 0.4s,padding 0.3s;
}
nav.scrolled{
  background:rgba(10,10,10,0.85);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);padding:16px 48px;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.nav-logo{font-size:1.05rem;font-weight:300;letter-spacing:4px;color:rgba(255,255,255,0.7)}
.nav-logo span{color:rgba(230,126,34,0.6)}
.nav-links{list-style:none;display:flex;gap:32px}
.nav-links a{
  color:rgba(255,255,255,0.4);text-decoration:none;font-size:0.78rem;
  letter-spacing:2px;font-weight:400;text-transform:uppercase;
  transition:color 0.3s;padding:4px 0;border-bottom:1px solid transparent;
}
.nav-links a:hover{color:rgba(255,255,255,0.8)}
.nav-links a.active{color:#e67e22;border-bottom-color:#e67e22}
.hero{
  min-height:50vh;display:flex;flex-direction:column;justify-content:center;
  align-items:center;text-align:center;padding:140px 24px 60px;position:relative;z-index:2;
}
.hero-subtitle{
  font-size:0.75rem;letter-spacing:4px;text-transform:uppercase;
  color:rgba(255,255,255,0.3);margin-bottom:16px;
}
.hero-title{
  font-size:3rem;font-weight:200;letter-spacing:6px;color:#fff;margin-bottom:16px;line-height:1.2;
}
.hero-title strong{
  font-weight:700;background:linear-gradient(135deg,#e67e22,#f39c12);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-desc{font-size:0.9rem;color:#667;letter-spacing:1px;line-height:1.8}
.hero .divider{width:60px;height:2px;background:linear-gradient(90deg,#e67e22,#f39c12);border-radius:2px;margin:20px auto 0}
.scroll-indicator{
  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0.4;
}
.scroll-indicator .mouse{
  width:22px;height:34px;border:2px solid rgba(255,255,255,0.3);border-radius:12px;position:relative;
}
.scroll-indicator .mouse::after{
  content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);
  width:3px;height:8px;background:rgba(255,255,255,0.5);border-radius:2px;
  animation:scrollWheel 2s ease-in-out infinite;
}
@keyframes scrollWheel{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(12px)}}
.scroll-indicator span{font-size:0.6rem;letter-spacing:2px;color:rgba(255,255,255,0.3)}

.gallery-section{padding:0 24px 80px;position:relative;z-index:2}
.gallery{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:24px}

.card{
  background:rgba(255,255,255,0.03);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.06);
  border-radius:20px;padding:32px 28px 28px;display:flex;flex-direction:column;
  transition:all 0.4s ease;position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(135deg,rgba(230,126,34,0.04),transparent 60%);
  opacity:0;transition:opacity 0.4s;pointer-events:none;
}
.card:hover::before{opacity:1}
.card:hover{
  transform:translateY(-6px);border-color:rgba(230,126,34,0.15);
  box-shadow:0 24px 60px rgba(0,0,0,0.5);
}
.card .icon{font-size:42px;margin-bottom:14px;display:block}
.card h2{font-size:1.2rem;font-weight:600;color:#f0f4ff;margin-bottom:6px;letter-spacing:1px}
.card .description{font-size:0.88rem;line-height:1.7;color:#8899bb;flex:1;margin-bottom:20px}
.card .tags{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.card .tag{
  font-size:0.7rem;font-weight:500;padding:3px 10px;border-radius:20px;
  background:rgba(230,126,34,0.1);color:#e67e22;border:1px solid rgba(230,126,34,0.15);
}
.card .tag.audio{background:rgba(230,126,34,0.12);color:#f39c12;border-color:rgba(230,126,34,0.2)}
.card .tag.text{background:rgba(77,166,255,0.1);color:#7bbaff;border-color:rgba(77,166,255,0.15)}
.card .btn-group{display:flex;gap:10px;flex-wrap:wrap}
.card .btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 22px;border-radius:30px;font-size:0.82rem;font-weight:500;
  border:none;cursor:pointer;text-decoration:none;transition:all 0.25s;
}
.card .btn:active{transform:scale(0.97)}
.btn-launch{
  background:linear-gradient(135deg,rgba(230,126,34,0.15),rgba(243,156,18,0.15));
  color:#f0d8b0;border:1px solid rgba(230,126,34,0.2);
}
.btn-launch:hover{
  background:linear-gradient(135deg,rgba(230,126,34,0.25),rgba(243,156,18,0.25));
  border-color:rgba(230,126,34,0.35);transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(230,126,34,0.1);
}
.btn-launch2{
  background:rgba(255,255,255,0.04);color:#99aacb;
  border:1px solid rgba(255,255,255,0.08);
}
.btn-launch2:hover{background:rgba(255,255,255,0.08);color:#c8d8ff}
.card .file-info{
  margin-top:14px;font-size:0.72rem;color:#445566;display:flex;gap:16px;
}
.card .file-info span{display:inline-flex;align-items:center;gap:4px}

footer{
  text-align:center;padding:20px 24px 40px;font-size:0.85rem;
  color:#445566;border-top:1px solid rgba(255,255,255,0.03);position:relative;z-index:2;
}

@media(max-width:600px){
  .hero-title{font-size:2rem;letter-spacing:4px}
  .hero{min-height:40vh;padding:100px 20px 50px}
  .gallery{grid-template-columns:1fr;gap:18px}
  .card{padding:24px 22px}
  nav{padding:16px 20px}
  nav.scrolled{padding:12px 20px}
  .nav-links{gap:16px}
  .nav-links a{font-size:0.7rem;letter-spacing:1px}
}
</style>
</head>
<body>
<div id="cursor-glow"></div>
<nav id="navbar">
  <div class="nav-logo">Tools<span>·</span>Collection</div>
  <ul class="nav-links">
    <li><a href="../index.html">主页</a></li>
    <li><a href="../demos.html">演示</a></li>
    <li><a href="../learn.html">学习</a></li>
    <li><a href="index.html" class="active">工具</a></li>
  </ul>
</nav>

<section class="hero">
  <p class="hero-subtitle">Online Tools</p>
  <h1 class="hero-title"><strong>工具</strong>箱</h1>
  <p class="hero-desc">纯前端 · 文件不上传服务器 · 快捷高效</p>
  <div class="divider"></div>
  <div class="scroll-indicator">
    <div class="mouse"></div>
    <span>Scroll</span>
  </div>
</section>

<section class="gallery-section">
  <div class="gallery" id="gallery"></div>
</section>

<footer>© 2025 · Tools Collection</footer>

<script>
const tools=[
  {
    file:'epub2txt.html',
    icon:'📖',
    title:'EPUB → TXT 转换',
    tags:['文本'],
    description:'将 EPUB 电子书转换为纯文本格式，保留正文内容。支持批量选择，一键转换下载，适合在阅读器或编辑器中使用。',
  },
  {
    file:'wav2mp3.html',
    icon:'🎵',
    title:'音频 → MP3 转换',
    tags:['音频'],
    description:'批量将 WAV / M4A 音频文件转换为 MP3 格式。支持自定义比特率（8~320 kbps），实时进度显示，可 ZIP 打包下载。',
  },
];
const gallery=document.getElementById('gallery');
tools.forEach((t,i)=>{
  const tagHtml=t.tags.map(tg=>'<span class="tag '+(tg==='音频'?'audio':'text')+'">'+tg+'</span>').join('');
  const card=document.createElement('div');
  card.className='card';
  card.style.opacity='0';card.style.transform='translateY(24px)';
  card.style.transition='opacity 0.6s ease, transform 0.6s ease';
  card.style.transitionDelay=i*0.12+'s';
  card.innerHTML=
    '<span class="icon">'+t.icon+'</span>'+
    '<div class="tags">'+tagHtml+'</div>'+
    '<h2>'+t.title+'</h2>'+
    '<p class="description">'+t.description+'</p>'+
    '<div class="btn-group">'+
    '<a class="btn btn-launch" href="'+t.file+'">打开工具 →</a>'+
    '</div>';
  gallery.appendChild(card);
  requestAnimationFrame(()=>{card.style.opacity='1';card.style.transform='translateY(0)';});
});
</script>
<script>
const glow=document.getElementById('cursor-glow');
let gx=-200,gy=-200,tx=-200,ty=-200;
document.addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY;});
(function ani(){gx+=(tx-gx)*0.06;gy+=(ty-gy)*0.06;glow.style.left=gx+'px';glow.style.top=gy+'px';requestAnimationFrame(ani);})();
const nav=document.getElementById('navbar');
window.addEventListener('scroll',()=>{nav.classList.toggle('scrolled',window.scrollY>60);});
</script>
</body>
</html>
